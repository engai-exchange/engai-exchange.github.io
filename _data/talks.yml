- speaker: Aliyu Kasimu
  institution: The Hong Kong University of Science and Technology
  type: previous
  date: 7/28/2025
  title: "Vehicle–Bridge Interaction: Physics- and Data-Driven Modelling of Dynamical Systems"
  abstract: "Vehicle–bridge interaction (VBI) systems couple moving vehicles with flexible bridge structures, producing complex, often nonsmooth dynamics that matter for structural health, ride comfort, and safety. This talk surveys physics-based modelling of VBI — including contact, impact, and multibody formulations — and discusses how data-driven and hybrid approaches can complement classical models when measurements are limited or the system is only partially observed. We highlight modelling choices that affect prediction fidelity, opportunities for reduced-order and AI-assisted methods, and open challenges in bringing VBI analysis closer to real-world monitoring and design."
  bio: "Aliyu Kasimu is a postgraduate student at The Hong Kong University of Science and Technology. His research interests include physics- and data-driven modelling of dynamical systems, with a focus on vehicle–bridge interaction (VBI), particularly the nonsmooth dynamics of VBI systems. He is a founding organizer of EngAI Xchange."
